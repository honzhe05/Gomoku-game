<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Gomoku</title>
    
    <link rel="stylesheet" href="./main.css">
  </head>
  <body>
    <h1 class="title" onclick="backToMain()">Gomoku</h1>
    
    <div id="menu" style="display:flex; flex-direction:column;">
      <div style="display:flex; justify-content:center; gap:10px;">
        <button class="btn" onclick="startTwoPlayer()">
          Two-Player
        </button>
        <button class="btn" onclick="vsAi()">
          v.s. AI
        </button>
      </div>
      <div class="little">
        <h3>You can choose to play against a friend, or if you're single, you can play against an AI machine.<br>Powered by Honzhe and ChatGPT(#</h3>
      </div>
      
    </div>
    <div id="playscreen">
      <div class="game-wrapper">
        <div id="Board"></div>
        
        <div class="side-panel">
          <button class="btn" onclick="resetGame()">Reset</button>
        </div>
      </div>
    </div>
        
    <script src="./board.js"></script>
  </body>
</html>
